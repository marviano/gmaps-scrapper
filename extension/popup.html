<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>gmaps scraper</title>
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 12px;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        font-size: 13px;
        color: #1f1f1f;
      }
      .title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }
      .title-left {
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 1;
        min-width: 0;
      }
      .title-right {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      h1 {
        font-size: 14px;
        margin: 0;
        font-weight: 600;
        flex: 1;
        min-width: 0;
        line-height: 1.25;
      }
      button {
        width: 100%;
        padding: 8px 10px;
        margin-bottom: 7px;
        cursor: pointer;
        border: 1px solid #ccc;
        border-radius: 6px;
        background: #f8f8f8;
        font-size: 13px;
      }
      button.primary {
        background: #1a73e8;
        color: #fff;
        border-color: #1a73e8;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      /** Crypto rows: icon + chain label + address (tap copies) */
      .wallet-stack {
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .wallet-stack[hidden] {
        display: none !important;
      }
      .wallet-toggle {
        width: auto;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4px 6px;
        border-radius: 999px;
        border: 1px solid #e2e6eb;
        background: #f7f9fb;
      }
      .wallet-toggle:hover {
        background: #f0f3f6;
        border-color: #d6dbe1;
      }
      .status-row #wallet-toggle {
        margin-left: auto;
        flex-shrink: 0;
      }
      .coin-cluster {
        position: relative;
        width: 29px;
        height: 16px;
        display: inline-block;
      }
      .coin-cluster img {
        position: absolute;
        top: 0;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 1px solid #fff;
        background: #fff;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
        object-fit: contain;
      }
      .coin-cluster .coin-a {
        left: 0;
        z-index: 3;
      }
      .coin-cluster .coin-b {
        left: 7px;
        z-index: 2;
      }
      .coin-cluster .coin-c {
        left: 14px;
        z-index: 1;
      }
      .crypto-wallet-row {
        margin: 0;
        width: 100%;
        padding: 8px 10px;
        display: flex;
        align-items: center;
        gap: 10px;
        text-align: left;
        background: #f8f9fa;
        border: 1px solid #e8eaed;
        border-radius: 8px;
        color: inherit;
      }
      .crypto-wallet-row:hover {
        background: #f1f3f4;
        border-color: #dadce0;
      }
      .crypto-wallet-icon {
        flex-shrink: 0;
        width: 22px;
        height: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .crypto-wallet-icon svg,
      .crypto-wallet-icon img {
        display: block;
        max-width: 22px;
        max-height: 22px;
        width: 22px;
        height: auto;
        object-fit: contain;
      }
      .crypto-wallet-body {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .crypto-wallet-kind {
        font-size: 11px;
        font-weight: 700;
        color: #5f6368;
        letter-spacing: 0.02em;
        min-width: 30px;
      }
      .crypto-wallet-addr {
        font-family:
          ui-monospace,
          "Cascadia Code",
          "Source Code Pro",
          Menlo,
          Consolas,
          monospace;
        font-size: 10px;
        line-height: 1.25;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #3c4043;
        letter-spacing: -0.02em;
        flex: 1;
      }
      .crypto-copy-btn {
        width: auto;
        min-width: 44px;
        margin: 0;
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 10px;
        line-height: 1.2;
      }
      .lang-switch {
        display: inline-flex;
        border: 1px solid #d8d8d8;
        border-radius: 8px;
        overflow: hidden;
      }
      .lang-switch button {
        width: auto;
        margin: 0;
        border: 0;
        border-right: 1px solid #d8d8d8;
        border-radius: 0;
        padding: 5px 7px;
        font-size: 11px;
        background: #fafafa;
      }
      .lang-switch button:last-child {
        border-right: 0;
      }
      .lang-switch button.active {
        background: #1a73e8;
        color: #fff;
      }
      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
      }
      .collect-controls {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 6px 0 8px;
      }
      .collect-controls label {
        font-size: 11px;
        color: #555;
        white-space: nowrap;
      }
      .collect-controls select {
        flex: 1;
        min-width: 0;
        border: 1px solid #d7d7d7;
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 12px;
        background: #fff;
      }
      .collect-custom-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: -2px 0 8px;
        padding-left: 0;
      }
      .collect-custom-row[hidden] {
        display: none !important;
      }
      .collect-custom-row label {
        font-size: 11px;
        color: #555;
        white-space: nowrap;
      }
      #review-limit-custom {
        flex: 1;
        min-width: 0;
        max-width: 120px;
        border: 1px solid #d7d7d7;
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 12px;
      }
      .manual-stop-warning {
        font-size: 11px;
        color: #8a1c1c;
        background: #fff3f3;
        border: 1px solid #ffd6d6;
        border-radius: 6px;
        padding: 6px 8px;
        margin: 8px 0 0;
        line-height: 1.35;
      }
      .manual-stop-warning[hidden] {
        display: none !important;
      }
      #status {
        font-size: 12px;
        color: #333;
        white-space: pre-wrap;
        flex: 1;
        min-width: 0;
      }
      .spinner {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 2px solid #d8e7ff;
        border-top-color: #1a73e8;
        animation: spin 0.7s linear infinite;
      }
      .spinner[hidden] {
        display: none;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .tutorial {
        margin: 8px 0 10px;
        border: 1px solid #ececec;
        border-radius: 8px;
        padding: 8px;
        background: #fcfcfc;
      }
      .tutorial-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
      }
      .tutorial h2 {
        font-size: 12px;
        margin: 0;
      }
      .slide {
        border-radius: 8px;
        padding: 9px;
        border: 1px solid #efefef;
        background: #fff;
        min-height: 110px;
        height: auto;
        display: flex;
        flex-direction: column;
        overflow-y: hidden;
        overflow-x: hidden;
      }
      .slide-title {
        font-size: 12px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .slide-desc {
        font-size: 11px;
        color: #555;
        line-height: 1.35;
        white-space: pre-wrap;
        margin: 0;
        padding: 0;
      }
      .slide-desc > span {
        display: block;
        margin: 0;
        padding: 0;
      }
      .inline-link-row {
        display: flex;
        align-items: center;
        gap: 4px;
        flex-wrap: nowrap;
        line-height: 1;
        margin: 0;
        padding: 0;
        white-space: nowrap;
        overflow: hidden;
      }
      .inline-link {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        text-decoration: underline;
        color: #1a73e8;
        font-weight: 600;
        line-height: 1;
        height: 16px;
        font-size: 11px;
        cursor: pointer;
      }
      .inline-link:hover {
        text-decoration: underline;
        color: #1558b8;
      }
      .inline-link-join {
        margin: 0 8px 0 6px;
      }
      .slide-links {
        display: flex;
        gap: 8px;
        margin: 6px 0 0;
        flex-wrap: wrap;
      }
      .slide-links.two-col {
        display: flex;
      }
      .slide-links a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 7px 9px;
        border-radius: 10px;
        border: 1px solid #e6e6e6;
        background: #fafafa;
        text-decoration: none;
        color: #222;
        font-size: 12px;
        font-weight: 600;
        line-height: 1;
        flex: 1 1 120px;
      }
      .slide-links button {
        width: auto;
        margin: 0;
      }
      .prompt-box {
        display: flex;
        align-items: center;
        gap: 0;
        width: 100%;
        border: 1px solid #ddd;
        border-radius: 8px;
        overflow: hidden;
        background: #fff;
      }
      .prompt-input {
        flex: 1;
        min-width: 0;
        border: 0;
        border-radius: 0;
        padding: 6px 8px;
        font-size: 10px;
        background: #fff;
      }
      .prompt-box button {
        width: 34px;
        min-width: 34px;
        padding: 0;
        margin: 0;
        border: 0;
        border-left: 1px solid #ddd;
        border-radius: 0;
        height: 30px;
        background: #f7f7f7;
      }
      .slide-note {
        font-size: 11px;
        color: #555;
        line-height: 1.35;
        margin: 0;
        padding: 0;
      }
      .slide-links a:hover {
        background: #f2f2f2;
        border-color: #d8d8d8;
      }
      .slide-links a:focus-visible {
        outline: 2px solid #1a73e8;
        outline-offset: 2px;
      }
      .ai-logo {
        width: 14px;
        height: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .ai-logo img,
      .ai-logo svg {
        width: 14px;
        height: 14px;
        display: block;
        vertical-align: middle;
      }
      .slide-nav {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 8px;
      }
      .slide-nav button {
        width: auto;
        margin: 0;
        padding: 6px 8px;
        font-size: 12px;
      }
      .slide-nav #start {
        min-width: 150px;
      }
      .slide-counter {
        font-size: 11px;
        color: #666;
        user-select: none;
      }
      .actions {
        margin-top: 8px;
      }
      .creator-links {
        display: flex;
        align-items: center;
        gap: 7px;
        flex-shrink: 0;
      }
      .creator-links a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 27px;
        height: 27px;
        border-radius: 7px;
        background: #f5f5f5;
        border: 1px solid #e5e5e5;
        color: #24292f;
        text-decoration: none;
        transition:
          background 0.15s ease,
          border-color 0.15s ease,
          transform 0.12s ease;
      }
      .creator-links a:hover {
        background: #eee;
        border-color: #d8d8d8;
        transform: translateY(-1px);
      }
      .creator-links a:focus-visible {
        outline: 2px solid #1a73e8;
        outline-offset: 2px;
      }
      .creator-links a.discord-link {
        color: #5865f2;
        background: #f4f5ff;
        border-color: #e0e4ff;
      }
      .creator-links a.discord-link:hover {
        background: #ebedff;
        border-color: #ccd2ff;
      }
      .creator-links svg {
        width: 15px;
        height: 15px;
        display: block;
      }
    </style>
  </head>
  <body>
    <header class="title-row">
      <div class="title-left">
        <h1 id="title">gmaps scraper</h1>
      </div>
      <div class="title-right">
        <div class="lang-switch">
          <button type="button" id="lang-en" class="active">EN</button>
          <button type="button" id="lang-id">ID</button>
        </div>
        <div class="creator-links">
        <a
          href="https://github.com/marviano/gmaps-scraper"
          target="_blank"
          rel="noopener noreferrer"
          title="GitHub repo: marviano/gmaps-scraper"
          aria-label="Open marviano gmaps-scraper repository on GitHub"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"
            />
          </svg>
        </a>
        <a
          class="discord-link"
          href="https://discord.com/app"
          target="_blank"
          rel="noopener noreferrer"
          title="Discord — @axonide (open Discord to add as friend)"
          aria-label="Open Discord web app (@axonide)"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028 14.09 14.09 0 001.226-1.994.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"
            />
          </svg>
        </a>
        </div>
      </div>
    </header>

    <div class="collect-controls">
      <label id="review-limit-label" for="review-limit"></label>
      <select id="review-limit">
        <option value="50">50 reviews</option>
        <option value="100">100 reviews</option>
        <option value="custom">Custom…</option>
        <option value="all">All reviews</option>
      </select>
    </div>
    <div id="review-limit-custom-row" class="collect-custom-row" hidden>
      <label id="review-limit-custom-label" for="review-limit-custom"></label>
      <input
        id="review-limit-custom"
        type="number"
        inputmode="numeric"
        min="1"
        max="100000"
        step="1"
        autocomplete="off"
      />
    </div>

    <section class="tutorial">
      <div class="tutorial-top">
        <h2 id="tutorial-title"></h2>
        <div class="slide-counter" id="slide-counter"></div>
      </div>
      <div class="slide">
        <div id="slide-title" class="slide-title"></div>
        <div id="slide-desc" class="slide-desc"></div>
        <div id="slide-links" class="slide-links"></div>
      </div>
      <div class="slide-nav">
        <button type="button" id="slide-prev" aria-label="Previous step">←</button>
        <button type="button" id="start" class="primary"></button>
        <button type="button" id="slide-next" aria-label="Next step">→</button>
      </div>
    </section>

    <div class="actions">
      <button type="button" id="stop"></button>
      <button type="button" id="csv" disabled></button>
      <button type="button" id="copy" disabled></button>
    </div>

    <div class="status-row">
      <div id="status"></div>
      <div id="processing-spinner" class="spinner" hidden></div>
      <button type="button" id="wallet-toggle" class="wallet-toggle" aria-expanded="false" aria-controls="wallet-stack">
        <span class="coin-cluster" aria-hidden="true">
          <img class="coin-a" src="ethereum.png" alt="" onerror="this.onerror=null;this.src='wallet-row-icon.svg';" />
          <img class="coin-b" src="solana.png" alt="" onerror="this.onerror=null;this.src='wallet-row-icon.svg';" />
          <img class="coin-c" src="bitcoin.png" alt="" onerror="this.onerror=null;this.src='wallet-row-icon.svg';" />
        </span>
      </button>
    </div>
    <p id="manual-stop-warning" class="manual-stop-warning" hidden></p>

    <div class="wallet-stack" id="wallet-stack" hidden>
      <div id="copy-eth-wallet" class="crypto-wallet-row" data-wallet-kind="eth">
        <span class="crypto-wallet-icon" aria-hidden="true">
          <img
            src="ethereum.png"
            width="22"
            height="22"
            alt=""
            onerror="this.onerror=null;this.src='wallet-row-icon.svg';"
          />
        </span>
        <span class="crypto-wallet-body">
          <span id="crypto-chain-eth" class="crypto-wallet-kind"></span>
          <span id="crypto-addr-eth" class="crypto-wallet-addr"></span>
          <button type="button" class="crypto-copy-btn" data-wallet-address="" data-aria-key="walletCopyAriaEth"></button>
        </span>
      </div>

      <div id="copy-sol-wallet" class="crypto-wallet-row" data-wallet-kind="sol">
        <span class="crypto-wallet-icon" aria-hidden="true">
          <img
            src="solana.png"
            width="22"
            height="22"
            alt=""
            onerror="this.onerror=null;this.src='wallet-row-icon.svg';"
          />
        </span>
        <span class="crypto-wallet-body">
          <span id="crypto-chain-sol" class="crypto-wallet-kind"></span>
          <span id="crypto-addr-sol" class="crypto-wallet-addr"></span>
          <button type="button" class="crypto-copy-btn" data-wallet-address="" data-aria-key="walletCopyAriaSol"></button>
        </span>
      </div>

      <div id="copy-btc-wallet" class="crypto-wallet-row" data-wallet-kind="btc">
        <span class="crypto-wallet-icon" aria-hidden="true">
          <img
            src="bitcoin.png"
            width="22"
            height="22"
            alt=""
            onerror="this.onerror=null;this.src='wallet-row-icon.svg';"
          />
        </span>
        <span class="crypto-wallet-body">
          <span id="crypto-chain-btc" class="crypto-wallet-kind"></span>
          <span id="crypto-addr-btc" class="crypto-wallet-addr"></span>
          <button type="button" class="crypto-copy-btn" data-wallet-address="" data-aria-key="walletCopyAriaBtc"></button>
        </span>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
